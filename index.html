<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: #2f2b2a;
    }

    .separator {
      width: 100%;
      height: 100px;
      background: #2f2b2a;
    }

    iframe {
      width: 100dvw;
      height: 100dvh;
      border: none;
      display: block;
      margin: 0px;
    }

    .stickyOuter {
      height: calc(100dvh * var(--pages));
    }

    .sticky {
      position: sticky;
      top: 0;
      height: 100vh;
    }
  </style>
</head>

<body>

  <iframe src="chart1.html"></iframe>

  <div class="separator"></div>

  <div class="stickyOuter" style="--pages: 3">
    <div class="sticky">
      <iframe src="chart2.html"></iframe>
    </div>
  </div>

  <div class="separator"></div>

  <div class="stickyOuter" style="--pages: 4">
    <div class="sticky">
      <iframe src="chart3.html"></iframe>
    </div>
  </div>

  <script>
    const s2 = document.querySelector('.stickyOuter:has(iframe[src="chart2.html"])');
    const chart2 = document.querySelector('iframe[src="chart2.html"]');
    const s3 = document.querySelector('.stickyOuter:has(iframe[src="chart3.html"])');
    const chart3 = document.querySelector('iframe[src="chart3.html"]');

    window.addEventListener('scroll', () => {
      const r2 = s2.getBoundingClientRect();
      const progress2 = Math.max(0, Math.min(1, -r2.top / (r2.height - innerHeight)));
      chart2.contentWindow.postMessage({ progress: progress2 }, '*');
      const r3 = s3.getBoundingClientRect();
      const progress3 = Math.min(1, -r3.top / (r3.height - innerHeight));
      chart3.contentWindow.postMessage({ progress: progress3 }, '*');
    }, { passive: true });

    window.addEventListener('message', e => {
      if (e.data.scrollTo === undefined) return;
      if (e.source === chart2.contentWindow) {
        const r = s2.getBoundingClientRect();
        const scrollable = r.height - innerHeight;
        const target = s2.offsetTop + e.data.scrollTo * scrollable;
        window.scrollTo({ top: target });
      } else if (e.source === chart3.contentWindow) {
        const r = s3.getBoundingClientRect();
        const scrollable = r.height - innerHeight;
        const target = s3.offsetTop + e.data.scrollTo * scrollable;
        window.scrollTo({ top: target });
      }
    });
  </script>
</body>

</html>
